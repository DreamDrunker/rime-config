  "style/color_scheme_dark": MyStyleMiDark  # 深色主题配色方案
  "style/color_scheme": MyStyleMi # 浅色主题配色方案
  "style/display_tray_icon": true # 显示托盘图标
  "style/font_face": "Microsoft YaHei" # 字体样式为"Microsoft YaHei"
  "style/font_point": 14 # 字体大小为14pt
  "style/label_font_point": 14 # 候选词数字大小为14
  "style/horizontal": false # 横向展示候选词
  "style/vertical": true # 纵向展示候选词
  "style/inline_preedit": false #  内嵌预编辑，true，表示单行。false双行
  "style/layout/corner_radius": 5 # 窗口圆角半径为8
  "style/layout/border": 1 # 窗口边界高度为0（无边界效果）1有边框
  "style/layout/shadow_radius": 1 # 阴影的模糊半径
  "style/layout/shadow_offset_x": 2 # 阴影向右偏移
  "style/layout/shadow_offset_y": 2 # 阴影向下便宜
  "style/layout/border_width": 1 # 窗口边界宽度为0（无边界效果）1有边框
  "style/layout/candidate_spacing": 14 # 候选词之间的间距为14
  "style/layout/hilite_padding": 1 # 高亮区域内边距为8
  "style/layout/hilite_spacing": 3 # 高亮区域之间的间距为3d
  "style/layout/margin_x": 8 # 水平方向外边距为8
  "style/layout/margin_y": 6 # 垂直方向外边距为
  "style/layout/round_corner": 3 # 窗口圆角的程度为5dde
  "style/layout/spacing": 5 # 候选词水平间距为10
  
  
  


